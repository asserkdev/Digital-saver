name: Build Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: cd app && flutter pub get
      - run: cd app && flutter build web
      - uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: app/build/web
