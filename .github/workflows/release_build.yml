name: Build Release (Android)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., v1.0.0-beta)'
        required: false
        type: string

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd app
          flutter pub get
          # Remove cached lock to force dependency_overrides to take effect
          rm -f pubspec.lock
          flutter pub get

      - name: Build Android APK (Release)
        run: cd app && flutter build apk --release

      - name: Rename APK
        run: |
          cd app/build/app/outputs/flutter-apk
          # Get version from tag, input, or default
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -z "$VERSION" ] || [[ "$VERSION" == refs/heads/* ]]; then
            VERSION="${{ inputs.release_version || 'dev' }}"
          fi
          mv app-release.apk "digital_saver_android_${VERSION}.apk"
          ls -la

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/app/outputs/flutter-apk/digital_saver_android_*.apk
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: true
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
