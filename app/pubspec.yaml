name: digital_saver
description: Professional smartwatch health monitoring system with emergency alerts
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Bluetooth LE
  flutter_blue_plus: ^1.31.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Charts & Visualization
  fl_chart: ^0.66.0
  percent_indicator: ^4.2.3
  
  # UI Components
  cupertino_icons: ^1.0.6
  
  # Localization
  intl: any
  
  # Notifications & Alerts
  url_launcher: ^6.2.2
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  
  # Utilities
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
