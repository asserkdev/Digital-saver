name: digital_saver
description: Professional smartwatch health monitoring system with emergency alerts - Cambric Health Suite
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_blue_plus: ^1.31.15
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  intl: ^0.19.0
  provider: ^6.1.2
  supabase_flutter: ^2.5.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3

# Override app_links to use a compatible version
dependency_overrides:
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
