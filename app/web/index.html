<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Digital Saver - Professional Smartwatch Health Monitoring System - Egyptian Government Project">
    <meta name="theme-color" content="#2563eb">
    <meta name="keywords" content="health monitoring, smartwatch, heart rate, blood pressure, emergency, Egypt">
    <title>Digital Saver - Health Monitoring System</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f8fafc;
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #1e293b;
            text-align: center;
        }
        .loading-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .loading h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #2563eb;
        }
        .loading p {
            font-size: 1.1em;
            color: #64748b;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="loading-card">
            <h1>Digital Saver</h1>
            <div class="spinner"></div>
            <p>Loading Health Monitor...</p>
            <p style="font-size: 0.9em; margin-top: 10px;">Egyptian Government Health Project</p>
        </div>
    </div>
    <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
